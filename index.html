<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一般常識クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>一般常識クイズ</h1>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-text" id="progressText">1 / 10 問</p>
    </header>

    <main>
      <!-- クイズ画面 -->
      <section id="quizSection">
        <div class="question-card">
          <p class="question-number" id="questionNumber">問題 1</p>
          <p class="question-text" id="questionText"></p>
          <ul class="choices" id="choiceList"></ul>
          <div class="feedback" id="feedback"></div>
          <button class="btn-next" id="btnNext" hidden>次の問題へ</button>
        </div>
      </section>

      <!-- 結果画面 -->
      <section id="resultSection" hidden>
        <div class="result-card">
          <p class="result-label">結果発表</p>
          <p class="score" id="scoreText"></p>
          <p class="score-message" id="scoreMessage"></p>
          <div class="result-actions">
            <button class="btn-retry" id="btnRetry">もう一度挑戦する</button>
            <button class="btn-exit" id="btnExit">終了する</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
